<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(registration => {
                console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, err => {
                console.log('ServiceWorker registration failed: ', err);
            });
        });
    }
</script>
</head>
<body>

    <div id="home-state" class="state active">
        <header>
            <h1>Scanify</h1>
        </header>
        <main>
            <p>Scan documents easily from your browser.</p>
            <button id="scan-btn">Scan Now</button>
        </main>
    </div>

    <div id="camera-state" class="state">
        <video id="video" autoplay playsinline></video>
        <div class="camera-controls">
            <button id="capture-btn">
                <span class="dot"></span>
            </button>
        </div>
    </div>

    <div id="review-state" class="state">
        <div class="image-container">
            <img id="review-image" src="" alt="Captured document">
            <canvas id="crop-canvas"></canvas>
        </div>
        <p class="status">Image captured and cropped.</p>
        <div class="review-controls">
            <button id="retake-btn">Retake</button>
            <button id="next-btn">Next</button>
            <button id="finish-btn">Finish</button>
        </div>
    </div>

    <div id="pdf-state" class="state">
        <header>
            <button id="back-btn">&larr;</button>
            <h1>My Scans</h1>
        </header>
        <div id="image-list"></div>
        <footer>
            <button id="create-pdf-btn">Create PDF</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
