<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanify | Premium Document Scanner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div id="app">
        <section id="screen-home" class="screen active">
            <div class="hero">
                <div class="logo">S</div>
                <h1>Scanify</h1>
                <p>Fast. Simple. Powerful.</p>
            </div>
            <button id="btn-start-scan" class="btn-primary-lg">Scan Now!</button>
            <div id="recent-scans-preview"></div>
        </section>

        <section id="screen-camera" class="screen">
            <video id="camera-feed" autoplay playsinline></video>
            <div class="camera-controls">
                <button id="btn-cancel-camera" class="btn-icon">✕</button>
                <button id="btn-capture" class="btn-capture"></button>
                <div class="spacer"></div>
            </div>
        </section>

        <section id="screen-editor" class="screen">
            <div class="canvas-container">
                <canvas id="editor-canvas"></canvas>
                <div id="crop-handles">
                    <div class="handle" id="h-tl"></div>
                    <div class="handle" id="h-tr"></div>
                    <div class="handle" id="h-bl"></div>
                    <div class="handle" id="h-br"></div>
                </div>
            </div>
            <div class="editor-controls">
                <button id="btn-retake" class="btn-secondary">Retake</button>
                <button id="btn-apply-crop" class="btn-primary">Apply Crop</button>
            </div>
        </section>

        <section id="screen-review" class="screen">
            <header class="app-bar">
                <button id="btn-add-page">+ Add Page</button>
                <button id="btn-finish" class="btn-success">Finish (PDF)</button>
            </header>
            <div id="pages-grid"></div>
        </section>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
