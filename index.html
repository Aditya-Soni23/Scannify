<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanify Pro</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
</head>
<body>
    <div class="app-container">
        <!-- Home State -->
      <!-- Home State -->
<div id="home-state" class="state active">
    <div class="hero-content">
        <!-- Replaced Rocket with Logo -->
        <div class="logo-wrapper">
            <img src="logo.png" alt="Scanify Logo" class="app-logo">
        </div>
        <h1>Scanify<span>Pro</span></h1>
        <p>Digitalize documents with AI precision.</p>
        <button id="scan-btn" class="primary-btn">Start Scanning</button>
    </div>
</div>
        <!-- Camera State -->
        <div id="camera-state" class="state">
            <video id="video" autoplay playsinline></video>
            <div class="scan-overlay">
                <div class="scan-line"></div>
            </div>
            <div class="camera-controls">
                <button id="capture-btn">
                    <div class="inner-circle"></div>
                </button>
            </div>
        </div>

        <!-- Review State -->
        <div id="review-state" class="state">
            <div class="glass-header">
                <h2>Adjust Corners</h2>
            </div>
            <div class="image-container">
                <canvas id="crop-canvas"></canvas>
            </div>
            <div class="review-controls">
                <button id="retake-btn" class="secondary-btn">Retake</button>
                <button id="next-btn" class="secondary-btn">Add Page</button>
                <button id="finish-btn" class="primary-btn">Finish</button>
            </div>
        </div>

        <!-- PDF/List State -->
        <div id="pdf-state" class="state">
            <header class="glass-header">
                <button id="back-btn" class="icon-btn">✕</button>
                <h1>My Scans</h1>
            </header>
            <div id="image-list"></div>
            <footer class="glass-footer">
                <button id="create-pdf-btn" class="primary-btn">Generate PDF</button>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
