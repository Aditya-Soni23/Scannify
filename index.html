<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanify Pro</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="style.css">
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
</head>
<body>

    <!-- Home State -->
    <div id="home-state" class="state active">
        <div class="glass-card">
            <h1 class="hero-logo">SCANIFY</h1>
            <p style="color: #888; margin-bottom: 30px;">Digital Document Architect</p>
            <button id="scan-btn">Initialize Scan</button>
        </div>
    </div>

    <!-- Camera State -->
    <div id="camera-state" class="state">
        <video id="video" autoplay playsinline></video>
        <div class="camera-controls">
            <button id="capture-btn"></button>
        </div>
    </div>

    <!-- Review State -->
    <div id="review-state" class="state">
        <div class="image-container">
            <canvas id="crop-canvas"></canvas>
        </div>
        <div class="review-controls">
            <button id="retake-btn">Retake</button>
            <button id="next-btn" style="border-color: var(--primary);">Add Page</button>
            <button id="finish-btn">Compile PDF</button>
        </div>
    </div>

    <!-- PDF State -->
    <div id="pdf-state" class="state">
        <header style="padding: 20px; display: flex; align-items: center; justify-content: space-between;">
            <button id="back-btn" style="padding: 8px 15px;">&larr;</button>
            <h2 style="font-size: 1.2rem;">Workspace</h2>
            <div style="width: 40px;"></div>
        </header>
        <div id="image-list"></div>
        <footer style="padding: 20px;">
            <button id="create-pdf-btn" style="width: 100%; background: var(--primary); color: #000;">Export as PDF</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
